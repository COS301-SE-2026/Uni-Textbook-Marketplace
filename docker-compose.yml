version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nexusdev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusdev
      POSTGRES_PASSWORD: nexusdev_local
      POSTGRES_DB: textbook_marketplace
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexusdev']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20
    container_name: nexusdev_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nexusdev:nexusdev_local@postgres:5432/textbook_marketplace

  frontend:
    image: node:20
    container_name: nexusdev_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data: