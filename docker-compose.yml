version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nexusdev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusdev
      POSTGRES_PASSWORD: nexusdev_local
      POSTGRES_DB: textbook_marketplace
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexusdev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: