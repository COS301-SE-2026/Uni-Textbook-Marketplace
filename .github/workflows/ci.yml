name: NexusDev CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nexusdev
          POSTGRES_PASSWORD: nexusdev_test
          POSTGRES_DB: textbook_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps

      - name: Fix missing jsesc module
        run: |
          if [ ! -d "backend/node_modules/jsesc" ] && [ -d "node_modules/jsesc" ]; then
            ln -sf ../../node_modules/jsesc backend/node_modules/jsesc
          fi

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run backend unit tests with coverage
        working-directory: backend
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://nexusdev:nexusdev_test@localhost:5432/textbook_marketplace_test
          JWT_SECRET: ci_test_secret
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm install --save-dev typescript@^5.0.0 @types/node@^20.0.0 @types/react@^18.0.0 @types/react-dom@^18.0.0 --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "All checks passed!"