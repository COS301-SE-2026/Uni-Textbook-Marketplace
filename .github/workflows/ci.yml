name: NexusDev CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # =========================================
  # Backend — NestJS
  # =========================================
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nexusdev
          POSTGRES_PASSWORD: nexusdev_test
          POSTGRES_DB: textbook_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps

      - name: Fix missing jsesc module
        run: |
          # Check if jsesc is missing in backend and symlink from root
          if [ ! -d "backend/node_modules/jsesc" ] && [ -d "node_modules/jsesc" ]; then
            echo "Creating symlink for jsesc"
            ln -sf ../../node_modules/jsesc backend/node_modules/jsesc
          fi
          
          # Also symlink @babel if needed
          if [ ! -d "backend/node_modules/@babel" ] && [ -d "node_modules/@babel" ]; then
            echo "Creating symlink for @babel"
            ln -sf ../../node_modules/@babel backend/node_modules/@babel
          fi

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run backend unit tests with coverage
        working-directory: backend
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://nexusdev:nexusdev_test@localhost:5432/textbook_marketplace_test
          JWT_SECRET: ci_test_secret
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # =========================================
  # Frontend — Next.js
  # =========================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Install frontend dependencies with explicit Next.js ESLint packages
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          # Ensure ESLint 9 and Next.js plugin are installed
          npm install --save-dev eslint@9.39.4 @next/eslint-plugin-next@14.1.0 --legacy-peer-deps

      - name: Fix missing modules for frontend
        run: |
          # Create symlinks for Next.js ESLint packages if still missing
          mkdir -p frontend/node_modules/@next
          
          if [ ! -d "frontend/node_modules/@next/eslint-plugin-next" ] && [ -d "node_modules/@next/eslint-plugin-next" ]; then
            echo "Creating symlink for @next/eslint-plugin-next"
            ln -sf ../../node_modules/@next/eslint-plugin-next frontend/node_modules/@next/eslint-plugin-next
          fi
          
          if [ ! -d "frontend/node_modules/eslint-config-next" ] && [ -d "node_modules/eslint-config-next" ]; then
            echo "Creating symlink for eslint-config-next"
            ln -sf ../../node_modules/eslint-config-next frontend/node_modules/eslint-config-next
          fi

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # =========================================
  # Summary — passes only if both pass
  # =========================================
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "All checks passed!"